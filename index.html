<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Are What You Use</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#000; width:100%; height:100%; display:flex; justify-content:center; align-items:center; overflow:hidden; }
#wrap { position:relative; }
canvas { display:block; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
/* =====================================================
   YOU ARE WHAT YOU USE
   ===================================================== */
const canvas=document.getElementById('c'),wrap=document.getElementById('wrap'),ctx=canvas.getContext('2d');
const W=960,H=540;
canvas.width=W;canvas.height=H;
function resize(){const s=Math.min(window.innerWidth/W,window.innerHeight/H);canvas.style.width=Math.floor(W*s)+'px';canvas.style.height=Math.floor(H*s)+'px';wrap.style.width=canvas.style.width;wrap.style.height=canvas.style.height;}
resize();window.addEventListener('resize',resize);

/* ── Noise ── */
const NOISES=[];
for(let n=0;n<6;n++){const nc=document.createElement('canvas');nc.width=W;nc.height=H;const nctx=nc.getContext('2d'),id=nctx.createImageData(W,H);for(let i=0;i<id.data.length;i+=4){const v=(Math.random()*255)|0;id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=(Math.random()*18)|0;}nctx.putImageData(id,0,0);NOISES.push(nc);}
let noiseIdx=0;

/* ── State ── */
const G={state:'TITLE',time:0,sadness:0,money:0,kills:0,pillsEffect:0,pillsTarget:0,choices:{}};
let scene={},bgNPCs=[];

/* ── Particles ── */
const PARTS=[];
function addBlood(x,y,n,spread){spread=spread||200;for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=40+Math.random()*spread;PARTS.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*100,life:.5+Math.random()*.9,maxLife:.5+Math.random()*.9,r:1.5+Math.random()*4});}}
function updateParts(dt){for(let i=PARTS.length-1;i>=0;i--){const p=PARTS[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=450*dt;p.life-=dt;if(p.life<=0)PARTS.splice(i,1);}}
function drawParts(){PARTS.forEach(p=>{const a=Math.max(0,p.life/p.maxLife);ctx.fillStyle=`rgba(125,0,0,${a*.9})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});}

/* ── Shake ── */
let shakeX=0,shakeY=0;
function addShake(i){shakeX=(Math.random()-.5)*i;shakeY=(Math.random()-.5)*i*.6;}
function decayShake(dt){shakeX*=Math.pow(.04,dt);shakeY*=Math.pow(.04,dt);}

/* ── Pills CSS effect ── */
function updatePills(dt){
  G.pillsEffect=lerp(G.pillsEffect,G.pillsTarget,dt*.85);
  if(G.pillsEffect<.01){canvas.style.filter='';return;}
  const pe=G.pillsEffect,t=G.time;
  const wave=Math.abs(Math.sin(t*2.1));
  const blur=(pe*1.1*wave+pe*0.26).toFixed(2);
  const hue=(Math.sin(t*1.6)*24+Math.sin(t*.8)*16)*pe;
  const sat=(1-pe*.38+Math.sin(t*4.2)*.08*pe).toFixed(3);
  const brt=(1-pe*.12+Math.sin(t*3.1)*.06*pe).toFixed(3);
  canvas.style.filter=`blur(${blur}px) hue-rotate(${hue.toFixed(1)}deg) saturate(${sat}) brightness(${brt})`;
}

/* ── Transition ── */
const TRANS={a:0,out:false,in:false,next:null};
function fadeTo(s){if(TRANS.out||TRANS.in)return;TRANS.out=true;TRANS.a=0;TRANS.next=s;}
function updateTrans(dt){if(TRANS.out){TRANS.a+=dt*2.2;if(TRANS.a>=1){TRANS.a=1;TRANS.out=false;TRANS.in=true;startScene(TRANS.next);}}else if(TRANS.in){TRANS.a-=dt*1.7;if(TRANS.a<=0){TRANS.a=0;TRANS.in=false;}}}
function drawTrans(){if(TRANS.a>0){ctx.fillStyle=`rgba(0,0,0,${TRANS.a})`;ctx.fillRect(0,0,W,H);}}

/* ── Narrator (top) ── */
const NARR={queue:[],cur:{text:'',alpha:0,timer:0,dur:0},
  show(txt,dur){dur=dur||3.5;this.queue.push({text:txt,dur});if(!this.cur.text)this._next();},
  _next(){if(!this.queue.length){this.cur.text='';return;}const it=this.queue.shift();this.cur={...it,alpha:0,timer:it.dur};},
  clear(){this.queue=[];this.cur={text:'',alpha:0,timer:0,dur:0};},
  update(dt){if(!this.cur.text){if(this.queue.length)this._next();return;}this.cur.timer-=dt;const t=this.cur.timer,d=this.cur.dur;if(t>d-.55)this.cur.alpha=Math.min(1,(d-t)/.55);else if(t<.75)this.cur.alpha=Math.max(0,t/.75);else this.cur.alpha=1;if(t<=0){this.cur.text='';if(this.queue.length)this._next();}},
  draw(){if(!this.cur.text||this.cur.alpha<=0)return;ctx.save();ctx.globalAlpha=this.cur.alpha;ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,.92)';ctx.shadowBlur=9;ctx.fillStyle='#f0ede8';ctx.font="italic 17px 'Courier New',monospace";ctx.fillText(this.cur.text,W/2,40);ctx.restore();}
};

/* ── Dialogue (bottom) ── */
const DIAL={active:false,lines:[],idx:0,ci:0,timer:0,done:false,cb:null};
function startDial(lines,cb){DIAL.active=true;DIAL.lines=lines.map(l=>typeof l==='string'?{text:l,spk:''}:l);DIAL.idx=0;DIAL.ci=0;DIAL.timer=0;DIAL.done=false;DIAL.cb=cb||null;}
function advDial(){if(!DIAL.active)return;if(!DIAL.done){DIAL.ci=DIAL.lines[DIAL.idx].text.length;DIAL.done=true;return;}DIAL.idx++;if(DIAL.idx>=DIAL.lines.length){DIAL.active=false;const cb=DIAL.cb;DIAL.cb=null;if(cb)cb();return;}DIAL.ci=0;DIAL.done=false;DIAL.timer=0;}
function updateDial(dt){if(!DIAL.active||DIAL.done)return;DIAL.timer+=dt;const sp=1/34;while(DIAL.timer>=sp){DIAL.timer-=sp;DIAL.ci++;if(DIAL.ci>=DIAL.lines[DIAL.idx].text.length){DIAL.done=true;break;}}}
function drawDial(){
  if(!DIAL.active)return;
  const text=DIAL.lines[DIAL.idx].text.slice(0,DIAL.ci),spk=DIAL.lines[DIAL.idx].spk||'';
  const bx=44,by=H-146,bw=W-134,bh=114;
  ctx.fillStyle='rgba(5,5,12,.93)';ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.fillRect(bx,by,bw,bh);ctx.strokeRect(bx,by,bw,bh);
  [[bx,by],[bx+bw,by],[bx,by+bh],[bx+bw,by+bh]].forEach(([cx,cy],i)=>{const sx=i%2===0?1:-1,sy=i<2?1:-1;ctx.strokeStyle='#484848';ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(cx+sx*12,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+sy*12);ctx.stroke();});
  if(spk){ctx.fillStyle='#666';ctx.font="bold 9px 'Courier New',monospace";ctx.fillText(spk.toUpperCase(),bx+14,by-4);}
  ctx.fillStyle='#eee8e0';ctx.font="14px 'Courier New',monospace";
  const words=text.split(' '),mxW=bw-32;let line='',ly=by+30;
  words.forEach((w,i)=>{const tl=line+w+' ';if(ctx.measureText(tl).width>mxW&&i>0){ctx.fillText(line,bx+14,ly);line=w+' ';ly+=23;}else line=tl;});ctx.fillText(line,bx+14,ly);
  if(DIAL.done&&!CHOICE.active){if(Math.sin(G.time*6)>0){ctx.fillStyle='#444';ctx.font="10px 'Courier New',monospace";ctx.textAlign='right';ctx.fillText('[CLICK]',bx+bw-10,by+bh-9);ctx.textAlign='left';}}
}

/* ── Choices ── */
const CHOICE={active:false,opts:[]};
const MOUSE={x:0,y:0};
function toC(cx,cy){const r=canvas.getBoundingClientRect(),sw=parseFloat(canvas.style.width)||W,sh=parseFloat(canvas.style.height)||H;return{x:(cx-r.left)*(W/sw),y:(cy-r.top)*(H/sh)};}
canvas.addEventListener('mousemove',e=>{const p=toC(e.clientX,e.clientY);MOUSE.x=p.x;MOUSE.y=p.y;canvas.style.cursor='default';});
canvas.addEventListener('click',e=>{
  if(TRANS.out||TRANS.in)return;
  const p=toC(e.clientX,e.clientY);MOUSE.x=p.x;MOUSE.y=p.y;
  if(G.state==='TITLE'){fadeTo('ALLEY');return;}
  if(G.state==='ALLEY'&&scene.phase==='knife_offered'&&!scene.knifeGone){const kx=W*.42,ky=H*.56;if(Math.hypot(MOUSE.x-kx,MOUSE.y-ky)<40){scene.knifeGone=true;G.hasKnife=true;scene.phase='dying';scene.dyingT=0;DIAL.active=false;return;}}
  if(G.state==='CREDITS'&&scene.canRestart){G.sadness=0;G.money=0;G.kills=0;G.pillsEffect=0;G.pillsTarget=0;G.choices={};canvas.style.filter='';PARTS.length=0;fadeTo('TITLE');return;}
  if(DIAL.active&&!CHOICE.active){advDial();return;}
  if(CHOICE.active&&!DIAL.active){CHOICE.opts.forEach(o=>{if(MOUSE.x>=o._x&&MOUSE.x<=o._x+o._w&&MOUSE.y>=o._y&&MOUSE.y<=o._y+o._h)doChoice(o.action);});}
});
function drawChoices(){
  if(!CHOICE.active)return;
  const bw=320,bh=58,total=CHOICE.opts.length,gap=26,sx=W/2-(total*bw+(total-1)*gap)/2;
  CHOICE.opts.forEach((o,i)=>{
    const bx=sx+i*(bw+gap),by=H*.762;o._x=bx;o._y=by;o._w=bw;o._h=bh;
    const hov=MOUSE.x>=bx&&MOUSE.x<=bx+bw&&MOUSE.y>=by&&MOUSE.y<=by+bh;if(hov)canvas.style.cursor='pointer';
    ctx.shadowColor=hov?'rgba(255,255,255,.26)':'transparent';ctx.shadowBlur=hov?14:0;
    ctx.fillStyle=hov?'#eee8e0':'rgba(9,9,16,.94)';ctx.strokeStyle=hov?'#eee8e0':'#444';ctx.lineWidth=1.8;
    ctx.fillRect(bx,by,bw,bh);ctx.strokeRect(bx,by,bw,bh);ctx.shadowBlur=0;
    ctx.fillStyle=hov?'#0a0a0a':'#e4e0da';ctx.font="bold 12px 'Courier New',monospace";ctx.textAlign='center';ctx.fillText(o.label,bx+bw/2,by+bh/2+5);ctx.textAlign='left';
  });
}

/* ── Choice handler ── */
function doChoice(action){
  CHOICE.active=false;G.choices[action]=true;
  if(action==='knife_yes'){G.money+=22;G.kills++;fadeTo('STAB_CU');}
  if(action==='knife_no'){G.sadness=Math.min(100,G.sadness+22);startDial([{text:"You pocket the knife. He walks away with his wallet.",spk:''}],()=>fadeTo('PHONE_SCENE'));}
  if(action==='phone_yes'){G.sadness=Math.min(100,G.sadness+14);fadeTo('PHONE_CU');}
  if(action==='phone_no'){G.sadness=Math.min(100,G.sadness+18);startDial([{text:"You leave the phone on the bench. You don't want to know.",spk:''}],()=>fadeTo('PILLS_SCENE'));}
  if(action==='pills_yes'){G.pillsTarget=0.85;startDial([{text:"You swallow them. The fog comes slowly. Then everything does.",spk:''}],()=>fadeTo('GUN_SCENE'));}
  if(action==='pills_no'){G.pillsTarget=0.26;G.sadness=Math.min(100,G.sadness+18);startDial([{text:"You leave them on the counter. The ache stays.",spk:''}],()=>fadeTo('GUN_SCENE'));}
  if(action==='gun_yes'){G.money+=60;G.kills++;fadeTo('GUN_CU');}
  if(action==='gun_no'){G.sadness=Math.min(100,G.sadness+26);startDial([{text:"You put it down. You walk away. Something in you has already shifted.",spk:''}],()=>fadeTo('ENDING'));}
}

/* ── Scene router ── */
function startScene(name){
  DIAL.active=false;CHOICE.active=false;NARR.clear();
  switch(name){
    case 'TITLE':       initTitle();      break; case 'ALLEY':       initAlley();      break;
    case 'CITY1':       initCity1();      break; case 'STAB_CU':     initStabCU();     break;
    case 'PHONE_SCENE': initPhoneScene(); break; case 'PHONE_CU':    initPhoneCU();    break;
    case 'PILLS_SCENE': initPillsScene(); break; case 'GUN_SCENE':   initGunScene();   break;
    case 'GUN_CU':      initGunCU();      break; case 'ENDING':      initEnding();     break;
    case 'CREDITS':     initCredits();    break;
  }
}

/* ── Helpers ── */
function lerp(a,b,t){return a+(b-a)*t;}
function figure(x,y,opts){
  opts=opts||{};
  const sz=opts.sz||1,col=opts.col||'#1c1c1c',eye=opts.eye||'dot',anim=opts.anim||0,glitch=opts.glitch||0,lie=opts.lie||false,blood=opts.blood||false,al=opts.al===undefined?1:opts.al,glow=opts.glow||null;
  ctx.save();ctx.globalAlpha*=al;
  let dx=0,dy=0;if(glitch>0){dx=(Math.random()-.5)*glitch;dy=(Math.random()-.5)*glitch*.3;}
  if(glow){ctx.shadowColor=glow;ctx.shadowBlur=22;}
  const bob=lie?0:Math.sin(anim*2.6)*1.8*sz,hs=20*sz,lw=2.5*sz;
  ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  if(!lie){
    const hx=x+dx,hy=y+dy,headY=hy-hs*1.45+bob;
    ctx.fillStyle='#eeeae3';ctx.strokeStyle=col;ctx.fillRect(hx-hs/2,headY,hs,hs);ctx.strokeRect(hx-hs/2,headY,hs,hs);
    const ey=headY+hs*.44,el=hx-5.5*sz,er=hx+5.5*sz;
    ctx.strokeStyle=col;ctx.lineWidth=lw*.8;
    if(eye==='dot'){ctx.fillStyle=col;ctx.beginPath();ctx.arc(el,ey,2.3*sz,0,Math.PI*2);ctx.arc(er,ey,2.3*sz,0,Math.PI*2);ctx.fill();}
    else if(eye==='sad'){ctx.fillStyle=col;ctx.beginPath();ctx.arc(el,ey+sz,2*sz,0,Math.PI*2);ctx.arc(er,ey+sz,2*sz,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(hx,ey+10*sz,4*sz,.18*Math.PI,.82*Math.PI);ctx.stroke();}
    else if(eye==='wide'){ctx.beginPath();ctx.arc(el,ey,4*sz,0,Math.PI*2);ctx.arc(er,ey,4*sz,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(hx,ey+8*sz,3*sz,0,Math.PI*2);ctx.stroke();}
    else if(eye==='x'){[[el,ey],[er,ey]].forEach(([ex,ey2])=>{const s=3.4*sz;ctx.beginPath();ctx.moveTo(ex-s,ey2-s);ctx.lineTo(ex+s,ey2+s);ctx.moveTo(ex+s,ey2-s);ctx.lineTo(ex-s,ey2+s);ctx.stroke();});}
    else if(eye==='spiral'){[[el,ey],[er,ey]].forEach(([ex,ey2])=>{for(let i=0;i<7;i++){const a1=i*.85,a2=a1+.7,r1=i*.65,r2=(i+1)*.65;ctx.beginPath();ctx.moveTo(ex+Math.cos(a1)*r1*sz,ey2+Math.sin(a1)*r1*sz);ctx.lineTo(ex+Math.cos(a2)*r2*sz,ey2+Math.sin(a2)*r2*sz);ctx.stroke();}});}
    ctx.lineWidth=lw;ctx.strokeStyle=col;
    const bT=headY+hs,bB=bT+14*sz;
    ctx.beginPath();ctx.moveTo(hx,bT);ctx.lineTo(hx,bB);ctx.moveTo(hx-18*sz,bT+5*sz);ctx.lineTo(hx+18*sz,bT+5*sz);ctx.moveTo(hx,bB);ctx.lineTo(hx-12*sz,bB+23*sz);ctx.moveTo(hx,bB);ctx.lineTo(hx+12*sz,bB+23*sz);ctx.stroke();
    if(blood){ctx.fillStyle='rgba(120,0,0,.8)';[[hx-4,headY+6],[hx+8,bT+4],[hx-2,bT+12]].forEach(([bx2,by2])=>{ctx.beginPath();ctx.arc(bx2,by2,3,0,Math.PI*2);ctx.fill();});ctx.fillStyle='rgba(100,0,0,.6)';ctx.fillRect(hx-1,headY+8,2,17);}
  } else {
    ctx.save();ctx.translate(x+dx,y+dy);ctx.fillStyle='#eeeae3';ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.fillRect(-hs*.85,-hs/2,hs,hs);ctx.strokeRect(-hs*.85,-hs/2,hs,hs);
    ctx.lineWidth=lw*.75;[[-5.5*sz,0],[5.5*sz,0]].forEach(([ex,ey])=>{const s=3*sz;ctx.beginPath();ctx.moveTo(ex-s,ey-s);ctx.lineTo(ex+s,ey+s);ctx.moveTo(ex+s,ey-s);ctx.lineTo(ex-s,ey+s);ctx.stroke();});
    ctx.lineWidth=lw;const bx=hs*.24;ctx.beginPath();ctx.moveTo(bx,0);ctx.lineTo(bx+30*sz,0);ctx.moveTo(bx+9*sz,0);ctx.lineTo(bx+9*sz,-15*sz);ctx.moveTo(bx+9*sz,0);ctx.lineTo(bx+17*sz,14*sz);ctx.moveTo(bx+30*sz,0);ctx.lineTo(bx+42*sz,-11*sz);ctx.moveTo(bx+30*sz,0);ctx.lineTo(bx+44*sz,7*sz);ctx.stroke();
    if(blood){ctx.fillStyle='rgba(110,0,0,.62)';ctx.beginPath();ctx.ellipse(bx+14*sz,10*sz,15*sz,7*sz,0,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
  ctx.restore();
}
function building(x,y,w,h,shade){shade=shade||'#2a2a2a';ctx.fillStyle=shade;ctx.fillRect(x,y,w,h);ctx.strokeStyle='#111';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);const cols=Math.max(1,Math.floor((w-10)/22)),rows=Math.max(1,Math.floor((h-10)/27));for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){ctx.fillStyle=Math.random()<.32?'rgba(255,225,145,.52)':'rgba(0,0,0,.44)';ctx.fillRect(x+6+c*22,y+7+r*27,12,16);}}
function drawSky(tint){const g=ctx.createLinearGradient(0,0,0,H*.58);if(tint==='red'){g.addColorStop(0,'#1e0a0a');g.addColorStop(1,'#582828');}else{g.addColorStop(0,'#2e3a46');g.addColorStop(1,'#6e7e8c');}ctx.fillStyle=g;ctx.fillRect(0,0,W,H*.6);}
function drawGround(y,col){ctx.fillStyle=col||'#a4a09a';ctx.fillRect(0,y,W,H-y);ctx.strokeStyle='rgba(0,0,0,.09)';ctx.lineWidth=1;for(let i=0;i<30;i++){const gx=(i*91+11)%W,gy=y+((i*73+5)%(H-y-8));ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx+7+(i*7)%14,gy);ctx.stroke();}}
function drawHUD(){const bx=W-38,by=52,bh=H-112;ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx-5,by-5,28,bh+10);ctx.strokeStyle='#242424';ctx.lineWidth=1;ctx.strokeRect(bx-5,by-5,28,bh+10);const fh=(G.sadness/100)*bh;ctx.fillStyle=G.sadness>70?'#7a0000':G.sadness>45?'#3d1f1f':'#282828';ctx.fillRect(bx,by+bh-fh,18,fh);for(let t=0;t<=5;t++){const ty=by+(1-t/5)*bh;ctx.strokeStyle='#2a2a2a';ctx.beginPath();ctx.moveTo(bx-5,ty);ctx.lineTo(bx,ty);ctx.stroke();}ctx.save();ctx.translate(bx+9,by+bh/2);ctx.rotate(-Math.PI/2);ctx.fillStyle='#2e2e2e';ctx.font="9px 'Courier New',monospace";ctx.textAlign='center';ctx.fillText('SADNESS',0,0);ctx.restore();if(G.money>0){ctx.fillStyle='#595959';ctx.font="bold 13px 'Courier New',monospace";ctx.textAlign='right';ctx.fillText('$'+G.money,W-52,33);ctx.textAlign='left';}if(G.sadness>60&&Math.random()<.055){try{const gy=(Math.random()*H)|0,gh=2+(Math.random()*8|0),id=ctx.getImageData(0,gy,W,gh),t2=document.createElement('canvas');t2.width=W;t2.height=gh;t2.getContext('2d').putImageData(id,0,0);ctx.drawImage(t2,(-24+Math.random()*48)|0,gy);}catch(e){}}}
function drawGrain(){ctx.globalAlpha=.06;ctx.drawImage(NOISES[Math.floor(noiseIdx)%6],0,0);ctx.globalAlpha=1;noiseIdx+=.28;}
function spawnBG(n){bgNPCs=[];for(let i=0;i<n;i++)bgNPCs.push({x:60+Math.random()*(W-160),y:H*.56+Math.random()*(H*.15),vx:(Math.random()-.5)*20,an:Math.random()*7,sz:.65+Math.random()*.38,al:.4+Math.random()*.5});}
function updateBG(dt){bgNPCs.forEach(n=>{n.x+=n.vx*dt;n.an+=dt;if(n.x<40)n.vx=Math.abs(n.vx);if(n.x>W-80)n.vx=-Math.abs(n.vx);});}

/* ============================================================  TITLE  ============================================================ */
function initTitle(){G.state='TITLE';scene={pulse:0};spawnBG(13);}
function updateTitle(dt){scene.pulse+=dt;updateBG(dt);}
function drawTitle(){
  ctx.fillStyle='#aeaaa3';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(0,0,0,.07)';ctx.lineWidth=1;for(let i=0;i<44;i++){const gx=(i*89+11)%W,gy=H*.18+((i*131)%(H*.78));ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx+6+(i*7)%14,gy);ctx.stroke();}
  bgNPCs.forEach(n=>figure(n.x,n.y,{sz:n.sz,anim:n.an,al:n.al}));
  const tvX=W*.49,tvY=H*.40,tvW=152,tvH=104;
  ctx.fillStyle='#1a1a1a';ctx.strokeStyle='#0a0a0a';ctx.lineWidth=3;ctx.fillRect(tvX-tvW/2,tvY-tvH/2,tvW,tvH);ctx.strokeRect(tvX-tvW/2,tvY-tvH/2,tvW,tvH);
  ctx.strokeStyle='#0a0a0a';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(tvX,tvY+tvH/2);ctx.lineTo(tvX,tvY+tvH/2+24);ctx.stroke();ctx.fillRect(tvX-20,tvY+tvH/2+20,40,8);
  ctx.save();ctx.beginPath();ctx.rect(tvX-tvW/2+9,tvY-tvH/2+9,tvW-18,tvH-18);ctx.clip();ctx.fillStyle='#16161e';ctx.fillRect(tvX-tvW/2,tvY-tvH/2,tvW,tvH);ctx.fillStyle='rgba(195,190,180,.85)';ctx.font="bold 9px 'Courier New',monospace";ctx.textAlign='center';ctx.fillText('YOU ARE WHAT',tvX,tvY-5);ctx.fillText('YOU USE',tvX,tvY+11);ctx.restore();

  NARR.draw();drawDial();drawChoices();
}

/* ============================================================  GUN CLOSE-UP  ============================================================ */
function initGunCU(){G.state='GUN_CU';scene={t:0,phase:'aim',n1:false,n2:false,n3:false,done:false,bloodAdded:false,shook:false};}
function updateGunCU(dt){
  const s=scene;s.t+=dt;const t=s.t;
  if(t<1.4)s.phase='aim';else if(t<1.85)s.phase='bang';else if(t<3.8)s.phase='silence';else if(t<4.7)s.phase='fade';else if(!s.done){s.done=true;fadeTo('ENDING');}
  if(t>.05&&!s.n1){s.n1=true;NARR.show("Your finger rests on the trigger.",3.0);}
  if(t>1.5&&!s.n2){s.n2=true;NARR.show("Louder than you expected.",2.5);}
  if(t>2.4&&!s.n3){s.n3=true;NARR.show("The money is still there. So is everything else.",3.8);}
  if(t>1.4&&!s.bloodAdded){s.bloodAdded=true;addBlood(W*.52,H*.46,44,320);}
  if(t>1.4&&!s.shook){s.shook=true;addShake(34);}
  updateParts(dt);decayShake(dt);
}
function drawGunCU(){
  const s=scene,t=s.t;
  ctx.fillStyle='#040408';ctx.fillRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W*.52,H*.42,H*.1,W*.52,H*.42,H*.7);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.85)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  const tEye=s.phase==='aim'?'dot':(s.phase==='silence'||s.phase==='fade')?'x':'dot';
  ctx.save();if(s.phase==='bang')ctx.globalAlpha=Math.max(0,1-(t-1.4)/.3);figure(W*.52,H*.46,{sz:2.0,col:'#1c1c1c',eye:tEye,blood:s.phase==='silence'||s.phase==='fade'});ctx.restore();
  if(s.phase==='silence'||s.phase==='fade'){const pr=Math.min(1,(t-1.85)/1.2);ctx.fillStyle=`rgba(80,0,0,${.52*pr})`;ctx.beginPath();ctx.ellipse(W*.52,H*.52+70,50*pr,16*pr,0,0,Math.PI*2);ctx.fill();}
  drawParts();
  // Gun barrel from bottom-right (YOUR perspective)
  const wobble=s.phase==='aim'?Math.sin(t*2.8)*.012:0;
  const armRootX=W*.82,armRootY=H*.98,aimX=W*.52,aimY=H*.42;
  const ang=Math.atan2(aimY-armRootY,aimX-armRootX)+wobble;
  ctx.save();ctx.translate(armRootX,armRootY);ctx.rotate(ang);
  ctx.strokeStyle='#1e1c18';ctx.lineWidth=14;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-120,0);ctx.stroke();
  ctx.fillStyle='#161618';ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1.5;ctx.fillRect(-148,-18,38,26);ctx.strokeRect(-148,-18,38,26);ctx.fillStyle='#101012';ctx.fillRect(-200,-7,56,14);ctx.strokeRect(-200,-7,56,14);ctx.strokeStyle='#222';ctx.lineWidth=5;ctx.beginPath();ctx.arc(-130,12,12,.1*Math.PI,.9*Math.PI);ctx.stroke();ctx.restore();
  if(s.phase==='bang'){const fa=Math.max(0,1-(t-1.4)/.44),fBX=armRootX+Math.cos(ang)*(-200),fBY=armRootY+Math.sin(ang)*(-200);const fg=ctx.createRadialGradient(fBX,fBY,0,fBX,fBY,80);fg.addColorStop(0,`rgba(255,240,160,${fa*.95})`);fg.addColorStop(.4,`rgba(255,140,40,${fa*.7})`);fg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=fg;ctx.beginPath();ctx.arc(fBX,fBY,80,0,Math.PI*2);ctx.fill();ctx.fillStyle=`rgba(255,240,220,${fa*.9})`;ctx.fillRect(0,0,W,H);}
  if(s.phase==='fade'){const fa=(t-3.8)/.9;ctx.fillStyle=`rgba(0,0,0,${Math.min(1,fa)})`;ctx.fillRect(0,0,W,H);}
  NARR.draw();
}

/* ============================================================  ENDING  ============================================================ */
function initEnding(){G.state='ENDING';scene={t:0,n1:false,autoFade:false};PARTS.length=0;for(let i=0;i<60;i++)addBlood(W*.28+Math.random()*(W*.5),H*.56+Math.random()*(H*.28),1,12);}
function updateEnding(dt){
  scene.t+=dt;updateParts(dt);
  if(scene.t>.1&&!scene.n1){scene.n1=true;if(G.kills>=2)NARR.show("You lost count somewhere around the second one.",4.5);else if(G.kills===1)NARR.show("You told yourself it would only be once.",4.5);else NARR.show("You said no to all of it. But you held the knife anyway.",4.5);}
  if(scene.t>5.2&&!scene.autoFade){scene.autoFade=true;fadeTo('CREDITS');}
}
function drawEnding(){
  const bad=G.kills>=2;
  const g2=ctx.createLinearGradient(0,0,0,H*.58);g2.addColorStop(0,bad?'#160606':'#1e1218');g2.addColorStop(1,bad?'#421212':'#382830');ctx.fillStyle=g2;ctx.fillRect(0,0,W,H*.6);
  drawGround(H*.556,bad?'#7e6060':'#7e7278');
  [{x:0,y:H*.1,w:108,h:H*.45},{x:190,y:H*.08,w:128,h:H*.47},{x:556,y:H*.06,w:138,h:H*.49},{x:804,y:H*.09,w:154,h:H*.46}].forEach(b=>building(b.x,b.y,b.w,b.h,'#1e1212'));
  // Blood pools
  [{x:W*.42,y:H*.72,rx:46,ry:14},{x:W*.60,y:H*.68,rx:38,ry:12},{x:W*.30,y:H*.75,rx:28,ry:9}].forEach(p=>{ctx.fillStyle='rgba(88,0,0,.68)';ctx.beginPath();ctx.ellipse(p.x,p.y,p.rx,p.ry,0,0,Math.PI*2);ctx.fill();});
  if(G.kills>=1)figure(W*.60,H*.70,{sz:1.1,col:'#3a0808',lie:true,blood:true});
  if(G.kills>=2)figure(W*.35,H*.73,{sz:1.1,col:'#3a0808',lie:true,blood:true});
  // Blood wall streaks
  if(bad){[W*.14,W*.82,W*.68].forEach(bx=>{ctx.fillStyle='rgba(100,0,0,.3)';ctx.fillRect(bx,H*.26,3,H*.28);});}
  drawParts();
  figure(W*.48,H*.67,{sz:1.1,anim:G.time*.15,eye:bad?'x':G.kills===1?'wide':'sad',col:bad?'#220000':'#1c1c1c'});
  NARR.draw();
}

/* ============================================================  CREDITS  ============================================================ */
const CRED=[
  {text:'"We shape our tools,',y:H*.32,sz:20,delay:1.0,bold:false},
  {text:'and thereafter',y:H*.32+36,sz:20,delay:2.3,bold:false},
  {text:'our tools shape us."',y:H*.32+72,sz:20,delay:3.6,bold:false},
  {text:'— Marshall McLuhan',y:H*.32+110,sz:13,delay:5.2,bold:false},
  {text:'YOU ARE WHAT YOU USE',y:H*.73,sz:23,delay:7.2,bold:true},
];
function initCredits(){G.state='CREDITS';scene={t:0,canRestart:false};PARTS.length=0;canvas.style.filter='';}
function updateCredits(dt){scene.t+=dt;if(scene.t>11&&!scene.canRestart)scene.canRestart=true;}
function drawCredits(){
  const bl=Math.min(1,scene.t/.7);ctx.fillStyle=`rgba(0,0,0,${bl})`;ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  CRED.forEach(item=>{const el=scene.t-item.delay;if(el<0)return;const alpha=Math.min(1,el/.95);ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=item.bold?'#d8d4ce':'#9a9690';ctx.font=`${item.bold?'bold ':''}`+`${item.sz}px 'Courier New',monospace`;ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=6;ctx.fillText(item.text,W/2,item.y);ctx.restore();});
  if(scene.canRestart&&Math.sin(G.time*3)>0){ctx.fillStyle='rgba(80,78,74,.65)';ctx.font="11px 'Courier New',monospace";ctx.textAlign='center';ctx.fillText('[ click to play again ]',W/2,H*.92);}
  ctx.textAlign='left';
}

/* ============================================================  MAIN LOOP  ============================================================ */
let last=0;
function loop(ts){
  requestAnimationFrame(loop);const dt=Math.min((ts-last)/1000,.05);last=ts;G.time+=dt;
  updateTrans(dt);updatePills(dt);NARR.update(dt);
  switch(G.state){
    case 'TITLE':       updateTitle(dt);       break; case 'ALLEY':       updateAlley(dt);      break;
    case 'CITY1':       updateCity1(dt);       break; case 'STAB_CU':     updateStabCU(dt);     break;
    case 'PHONE_SCENE': updatePhoneScene(dt);  break; case 'PHONE_CU':    updatePhoneCU(dt);    break;
    case 'PILLS_SCENE': updatePillsScene(dt);  break; case 'GUN_SCENE':   updateGunScene(dt);   break;
    case 'GUN_CU':      updateGunCU(dt);       break; case 'ENDING':      updateEnding(dt);     break;
    case 'CREDITS':     updateCredits(dt);     break;
  }
  ctx.save();if(Math.abs(shakeX)>.2||Math.abs(shakeY)>.2)ctx.translate(shakeX,shakeY);
  ctx.clearRect(-50,-50,W+100,H+100);
  switch(G.state){
    case 'TITLE':       drawTitle();       break; case 'ALLEY':       drawAlley();      break;
    case 'CITY1':       drawCity1();       break; case 'STAB_CU':     drawStabCU();     break;
    case 'PHONE_SCENE': drawPhoneScene();  break; case 'PHONE_CU':    drawPhoneCU();    break;
    case 'PILLS_SCENE': drawPillsScene();  break; case 'GUN_SCENE':   drawGunScene();   break;
    case 'GUN_CU':      drawGunCU();       break; case 'ENDING':      drawEnding();     break;
    case 'CREDITS':     drawCredits();     break;
  }
  ctx.restore();
  const noHUD=['TITLE','CREDITS','STAB_CU','PHONE_CU','GUN_CU'];if(!noHUD.includes(G.state))drawHUD();
  drawGrain();drawTrans();
}
startScene('TITLE');requestAnimationFrame(loop);
</script>
